<!doctype html><html lang="nl"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>PakMaatje</title><style>
:root{--lime:#d9ff37;--ink:#f5f8f1;--muted:#9da89e;--bg:#080b09;--card:#111713;--line:#2a362c;--red:#ff7084}*{box-sizing:border-box}body{margin:0;background:radial-gradient(circle at 9% 0,#2a3e13,transparent 32%),var(--bg);color:var(--ink);font:15px Inter,system-ui,sans-serif}button,input,select{font:inherit}button{border:0;cursor:pointer}.auth{min-height:100vh;display:grid;place-items:center;padding:22px}.authCard{width:min(410px,100%);padding:29px;background:#111713;border:1px solid #394a38;box-shadow:0 18px 50px #000b}.logo{margin:0;color:var(--lime);font-size:12px;letter-spacing:.17em;font-weight:900}.auth h1{margin:9px 0 4px;font-size:37px;letter-spacing:-1.8px;text-transform:uppercase}.auth p{color:var(--muted);line-height:1.5}.field{display:block;width:100%;margin:10px 0;padding:12px;border:1px solid #3b483c;background:#090d0a;color:var(--ink);outline-color:var(--lime)}.primary{padding:12px 16px;background:var(--lime);color:#0b1008;font-size:13px;letter-spacing:.06em;text-transform:uppercase;font-weight:900}.wide{width:100%;margin-top:4px}.switch{margin-top:16px;text-align:center;color:var(--muted);font-size:13px}.link{background:none;color:var(--lime);text-decoration:underline}.app{display:none}.app.show{display:block}.hero{padding:30px max(22px,calc((100% - 1080px)/2));background:linear-gradient(120deg,#090c09,#1a2911)}.heroTop{max-width:1080px;margin:auto;display:flex;align-items:center;justify-content:space-between;gap:16px}.hero h1{margin:3px 0;font-size:40px;letter-spacing:-2px;text-transform:uppercase}.sub{margin:0;color:#cbd5c8}.user{color:var(--muted);font-size:13px}.logout{margin-left:8px;background:none;color:var(--lime);text-decoration:underline}main{max-width:1080px;margin:-1px auto;padding:0 22px 60px}.shell{border:1px solid var(--line);background:var(--card);box-shadow:0 12px 34px #0008}.tabs{display:flex;border-bottom:1px solid var(--line);background:#0d120e}.tab{padding:15px 19px;color:var(--muted);background:none;font-weight:800}.tab.active{color:var(--lime);box-shadow:inset 0 -3px var(--lime)}.content{padding:25px}.view{display:none}.view.active{display:block}.heading{display:flex;justify-content:space-between;align-items:flex-start;gap:13px}.eyebrow{margin:0;color:var(--lime);font-size:12px;font-weight:900;letter-spacing:.12em;text-transform:uppercase}.heading h2{margin:4px 0;font-size:29px;letter-spacing:-1px;text-transform:uppercase}.progress{height:9px;margin:19px 0 5px;background:#293129}.progress div{height:100%;background:repeating-linear-gradient(90deg,var(--lime) 0 17px,#a8d414 18px 21px)}.note{margin:0;color:var(--muted);font-size:13px}.addLine{display:grid;grid-template-columns:1fr 90px auto;gap:8px;margin:22px 0 16px}.small{padding:8px 10px;font-size:12px}.categories{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:13px}.category{border:1px solid var(--line);background:#0d120e}.catHead{display:flex;justify-content:space-between;align-items:center;padding:12px;background:#182117;border-bottom:2px solid var(--lime)}.catHead b{text-transform:uppercase;letter-spacing:.05em}.item{display:grid;grid-template-columns:20px 1fr 63px auto;gap:8px;align-items:center;padding:11px;border-top:1px solid #273028}.item input{width:18px;height:18px;accent-color:var(--lime)}.item.done .name{text-decoration:line-through;color:var(--muted)}.amount{color:var(--lime);font-weight:800;font-size:13px;text-align:right}.x{padding:3px 5px;background:none;color:#909b91;font-size:18px}.empty{padding:22px;text-align:center;color:var(--muted);font-size:13px}.todo{max-width:720px}.todo .item{grid-template-columns:20px 1fr auto}.modal{display:none;position:fixed;inset:0;z-index:2;place-items:center;padding:18px;background:#000c}.modal.show{display:grid}.modal form{width:min(425px,100%);padding:23px;border:1px solid #53654e;background:#141c15}.modal h3{margin:0}.modal label{display:block;margin:12px 0 5px;color:var(--muted);font-size:13px}.actions{display:flex;justify-content:flex-end;gap:8px;margin-top:17px}.cancel{padding:12px;background:#2d382f;color:var(--ink)}@media(max-width:650px){.hero h1{font-size:33px}.content{padding:16px}.categories{grid-template-columns:1fr}.addLine{grid-template-columns:1fr 74px auto}.tab{padding:13px}.item{grid-template-columns:19px 1fr 52px auto}.user{display:none}}
</style></head><body>
<section class="auth" id="auth"><div class="authCard"><p class="logo">PAKMAATJE / CREW ACCESS</p><h1 id="authTitle">Welkom terug</h1><p id="authCopy">Log in om je groepen en lijsten te openen.</p><form id="authForm"><input class="field" id="email" required type="email" placeholder="E-mailadres"><input class="field" id="password" required type="password" minlength="4" placeholder="Wachtwoord"><button class="primary wide" id="authButton">Inloggen</button></form><p class="switch"><span id="switchText">Nog geen account?</span> <button class="link" id="switch">Account maken</button></p></div></section>
<div class="app" id="app"><header class="hero"><div class="heroTop"><div><p class="eyebrow">Pack loud. Plan smart.</p><h1>Festival crew</h1><p class="sub">Alles klaar vóór de bass drops.</p></div><div class="user"><span id="userEmail"></span><button class="logout" id="logout">Uitloggen</button></div></div></header><main><section class="shell"><nav class="tabs"><button class="tab active" data-tab="pack">🎒 Paklijst</button><button class="tab" data-tab="todo">✓ To-do list</button></nav><div class="content"><section class="view active" id="pack"><div class="heading"><div><p class="eyebrow">Paklijst</p><h2>Wat gaat er mee?</h2></div><button class="primary small" id="newCategory">+ Subgroep</button></div><div class="progress"><div id="bar"></div></div><p class="note" id="progressText"></p><form class="addLine" id="addPack"><input class="field" id="packName" required placeholder="Nieuw item, bijv. oordoppen"><input class="field" id="packAmount" required type="number" min="1" value="1"><select class="field" id="packCategory"></select><button class="primary small">Toevoegen</button></form><div class="categories" id="categories"></div></section><section class="view" id="todo"><div class="heading"><div><p class="eyebrow">To-do list</p><h2>Nog regelen</h2></div></div><form class="addLine todo" id="addTodo"><input class="field" id="todoName" required placeholder="Nieuwe taak, bijv. tickets downloaden"><span></span><span></span><button class="primary small">Toevoegen</button></form><div class="category todo" id="todos"></div></section></div></section></main></div>
<div class="modal" id="modal"><form id="catForm"><h3>Nieuwe subgroep</h3><label for="catName">Naam van de subgroep</label><input class="field" id="catName" required maxlength="30" placeholder="Bijv. Kamperen"><div class="actions"><button class="cancel" type="button" id="cancel">Annuleren</button><button class="primary">Aanmaken</button></div></form></div>
<script>
const KEY='pakmaatje-crew-v1',q=s=>document.querySelector(s);let signup=false,session=JSON.parse(localStorage.getItem(KEY)||'null')||null;function blank(email){return{email,categories:['Persoonlijk','Kamperen','Eten & drinken'],pack:[{id:1,n:'Oordoppen',a:1,c:'Persoonlijk',d:false},{id:2,n:'Powerbank',a:1,c:'Persoonlijk',d:true},{id:3,n:'Tent',a:1,c:'Kamperen',d:false}],todos:[{id:4,n:'Tickets downloaden',d:true},{id:5,n:'Rit regelen',d:false}]}}function save(){localStorage.setItem(KEY,JSON.stringify(session))}function uid(){return Date.now()+Math.random()}function show(){if(session){q('#auth').style.display='none';q('#app').classList.add('show');q('#userEmail').textContent=session.email;render()}else{q('#auth').style.display='grid';q('#app').classList.remove('show')}}function esc(v){return String(v).replace(/[&<>'"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c]))}function render(){let done=session.pack.filter(x=>x.d).length,total=session.pack.length;q('#bar').style.width=(total?done/total*100:0)+'%';q('#progressText').textContent=`${done} van ${total} items gepakt`;q('#packCategory').innerHTML=session.categories.map(x=>`<option>${esc(x)}</option>`).join('');q('#categories').innerHTML=session.categories.map(c=>{let a=session.pack.filter(x=>x.c===c);return`<div class="category"><div class="catHead"><b>${esc(c)}</b><span>${a.length} items</span></div>${a.length?a.map(x=>`<div class="item ${x.d?'done':''}"><input type="checkbox" ${x.d?'checked':''} onchange="togglePack(${x.id})"><span class="name">${esc(x.n)}</span><span class="amount">× ${x.a}</span><button class="x" onclick="removePack(${x.id})">×</button></div>`).join(''):'<p class="empty">Nog niets in deze groep.</p>'}</div>`}).join('');q('#todos').innerHTML=session.todos.length?`<div class="catHead"><b>To-do's</b></div>`+session.todos.map(x=>`<div class="item ${x.d?'done':''}"><input type="checkbox" ${x.d?'checked':''} onchange="toggleTodo(${x.id})"><span class="name">${esc(x.n)}</span><button class="x" onclick="removeTodo(${x.id})">×</button></div>`).join(''):'<p class="empty">Alles geregeld. Lekker bezig.</p>'}function togglePack(id){let x=session.pack.find(x=>x.id==id);x.d=!x.d;save();render()}function removePack(id){session.pack=session.pack.filter(x=>x.id!=id);save();render()}function toggleTodo(id){let x=session.todos.find(x=>x.id==id);x.d=!x.d;save();render()}function removeTodo(id){session.todos=session.todos.filter(x=>x.id!=id);save();render()}q('#authForm').onsubmit=e=>{e.preventDefault();let email=q('#email').value.trim();if(signup||!session)session=blank(email);else session.email=email;save();show()};q('#switch').onclick=e=>{e.preventDefault();signup=!signup;q('#authTitle').textContent=signup?'Maak je account':'Welkom terug';q('#authCopy').textContent=signup?'Maak een account om te beginnen.':'Log in om je groepen en lijsten te openen.';q('#authButton').textContent=signup?'Account maken':'Inloggen';q('#switchText').textContent=signup?'Heb je al een account?':'Nog geen account?';q('#switch').textContent=signup?'Inloggen':'Account maken'};q('#logout').onclick=()=>{session=null;localStorage.removeItem(KEY);show()};document.querySelectorAll('.tab').forEach(b=>b.onclick=()=>{document.querySelectorAll('.tab,.view').forEach(x=>x.classList.remove('active'));b.classList.add('active');q('#'+b.dataset.tab).classList.add('active')});q('#addPack').onsubmit=e=>{e.preventDefault();session.pack.push({id:uid(),n:q('#packName').value.trim(),a:q('#packAmount').value,c:q('#packCategory').value,d:false});e.target.reset();q('#packAmount').value=1;save();render()};q('#addTodo').onsubmit=e=>{e.preventDefault();session.todos.push({id:uid(),n:q('#todoName').value.trim(),d:false});e.target.reset();save();render()};q('#newCategory').onclick=()=>q('#modal').classList.add('show');q('#cancel').onclick=()=>q('#modal').classList.remove('show');q('#catForm').onsubmit=e=>{e.preventDefault();let n=q('#catName').value.trim();if(n&&!session.categories.includes(n))session.categories.push(n);q('#catName').value='';q('#modal').classList.remove('show');save();render()};show();
</script></body></html>
