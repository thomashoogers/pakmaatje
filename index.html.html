<!doctype html>
<html lang="nl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="theme-color" content="#4f46e5">
  <title>PakMaatje — samen voorbereid</title>
  <style>
    :root{--ink:#15203a;--sub:#6b7280;--paper:#f6f7fb;--card:#fff;--line:#e7e9f1;--brand:#5746df;--soft:#eeecff;--danger:#b84747}*{box-sizing:border-box}body{margin:0;color:var(--ink);background:var(--paper);font:15px/1.45 Inter,ui-sans-serif,system-ui,-apple-system,"Segoe UI",sans-serif}button,input,select{font:inherit}button{border:0;cursor:pointer}button:focus-visible,input:focus-visible,select:focus-visible{outline:3px solid #aea7ff;outline-offset:2px}.hero{padding:46px max(24px,calc((100% - 1120px)/2)) 66px;color:#fff;background:radial-gradient(circle at 86% 4%,#ab83ff 0,transparent 27%),linear-gradient(125deg,#1e2154,#5735c5)}.hero h1{font-size:clamp(34px,5vw,52px);line-height:1;margin:0;letter-spacing:-2px}.hero p{max-width:550px;margin:12px 0 0;opacity:.84;font-size:17px}main{max-width:1120px;margin:-29px auto 0;padding:0 24px 60px}.panel{background:var(--card);border:1px solid var(--line);border-radius:18px;box-shadow:0 7px 24px #2737550d}.new-group{display:grid;grid-template-columns:1fr 170px auto;gap:10px;padding:14px}.input{width:100%;padding:11px 13px;border:1px solid var(--line);border-radius:10px;background:#fff;color:var(--ink)}.primary{padding:11px 16px;background:var(--brand);border-radius:10px;color:#fff;font-weight:750}.primary:hover{background:#4838c8}.app{display:grid;grid-template-columns:270px 1fr;gap:22px;margin-top:25px}.sidebar{padding:13px}.eyebrow{margin:7px 8px 11px;color:var(--sub);font-size:12px;font-weight:800;letter-spacing:.09em;text-transform:uppercase}.group{display:block;width:100%;padding:12px;background:transparent;color:var(--ink);text-align:left;border-radius:11px}.group:hover,.group.active{background:var(--soft);color:#4132b5}.group-title{display:block;font-weight:750}.group-meta{display:block;margin-top:2px;color:var(--sub);font-size:13px}.board{padding:27px}.board-head{display:flex;justify-content:space-between;gap:16px;align-items:flex-start}.trip-type{margin:0;color:var(--brand);font-size:13px;font-weight:800;text-transform:uppercase;letter-spacing:.08em}.board h2{margin:3px 0 2px;font-size:29px;letter-spacing:-.9px}.board-sub{margin:0;color:var(--sub)}.delete{padding:8px;background:transparent;color:#9299a8;font-size:13px}.delete:hover{color:var(--danger)}.progress{height:9px;margin-top:20px;overflow:hidden;border-radius:20px;background:#e9ebf2}.progress>div{height:100%;border-radius:inherit;background:linear-gradient(90deg,#5c48df,#55cfa2);transition:width .25s}.progress-note{margin:6px 0 0;color:var(--sub);font-size:13px}.columns{display:grid;grid-template-columns:1fr 1fr;gap:18px;margin-top:26px}.list{overflow:hidden;border:1px solid var(--line);border-radius:14px}.list-top{display:flex;align-items:center;justify-content:space-between;padding:13px 14px;background:#fafbff}.list-top strong{font-size:16px}.add{padding:7px 9px;border-radius:8px;background:var(--soft);color:var(--brand);font-size:13px;font-weight:800}.item{display:grid;grid-template-columns:19px 1fr auto auto;gap:10px;align-items:center;padding:11px 14px;border-top:1px solid var(--line)}.item input{width:18px;height:18px;margin:0;accent-color:var(--brand)}.item-name{min-width:0}.item.done .item-name{text-decoration:line-through;color:var(--sub)}.owner{max-width:90px;padding:4px 7px;border-radius:999px;background:#f2f3f8;color:var(--sub);font-size:12px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.remove{padding:2px 5px;background:transparent;color:#b9bfca;font-size:19px;line-height:1}.remove:hover{color:var(--danger)}.empty{padding:25px 14px;color:var(--sub);text-align:center;font-size:14px}.modal-layer{position:fixed;inset:0;z-index:2;display:none;place-items:center;padding:18px;background:#10182d77}.modal-layer.open{display:grid}.modal{width:min(430px,100%);padding:23px}.modal h3{margin:0 0 4px;font-size:22px}.modal p{margin:0 0 15px;color:var(--sub)}.modal label{display:block;margin:12px 0 5px;font-size:13px;font-weight:700}.modal-footer{display:flex;justify-content:flex-end;gap:9px;margin-top:17px}.secondary{padding:11px 15px;border-radius:10px;background:#eef0f5;color:var(--ink)}.tip{margin:14px 8px 4px;color:var(--sub);font-size:12px}@media(max-width:720px){.hero{padding-bottom:48px}.new-group,.app,.columns{grid-template-columns:1fr}.app{margin-top:18px}.sidebar{display:flex;gap:6px;overflow:auto}.sidebar .eyebrow,.tip{display:none}.group{min-width:185px}.board{padding:19px}.board-head{gap:4px}.delete{white-space:nowrap}.item{grid-template-columns:19px 1fr auto}.owner{display:none}}
  </style>
</head>
<body>
  <header class="hero"><h1>PakMaatje</h1><p>Een gedeeld overzicht voor alles wat nog moet gebeuren en mee moet — voor vakanties, festivals en weekendjes weg.</p></header>
  <main>
    <form class="new-group panel" id="newGroupForm"><input class="input" id="groupName" required maxlength="45" placeholder="Naam van je groep, bijv. Lowlands 2026"><select class="input" id="groupType"><option>Festival</option><option>Vakantie</option><option>Weekend weg</option><option>Anders</option></select><button class="primary" type="submit">Groep maken</button></form>
    <div class="app"><aside class="sidebar panel"><p class="eyebrow">Jouw groepen</p><div id="groups"></div><p class="tip">Alles wordt op dit apparaat bewaard.</p></aside><section class="board panel" id="board"></section></div>
  </main>
  <div class="modal-layer" id="modalLayer" aria-hidden="true"><form class="modal panel" id="itemForm"><h3 id="modalTitle">Toevoegen</h3><p id="modalText">Vul het item in.</p><label for="itemName">Wat moet er gebeuren?</label><input class="input" id="itemName" required maxlength="70" placeholder="Bijv. zonnebrand"><label for="itemOwner">Wie pakt dit op? (optioneel)</label><input class="input" id="itemOwner" maxlength="24" placeholder="Bijv. Noor"><div class="modal-footer"><button class="secondary" type="button" id="cancel">Annuleren</button><button class="primary" type="submit">Toevoegen</button></div></form></div>
  <script>
    const storeKey='pakmaatje-v2';
    const example={id:1,name:'Zomertrip Portugal',type:'Vakantie',items:[{id:11,kind:'spullen',name:'Paspoort',owner:'Noor',done:true},{id:12,kind:'spullen',name:'Zonnebrand',owner:'Sem',done:false},{id:13,kind:'spullen',name:'Badhanddoek',owner:'',done:false},{id:14,kind:'taken',name:'Appartement boeken',owner:'Noor',done:true},{id:15,kind:'taken',name:'Auto huren',owner:'Sem',done:false}]};
    let groups=load(), activeId=groups[0].id, itemKind='spullen';
    const $=s=>document.querySelector(s); const uid=()=>Date.now()+Math.floor(Math.random()*999); const active=()=>groups.find(g=>g.id===activeId);
    function load(){try{const saved=JSON.parse(localStorage.getItem(storeKey));return Array.isArray(saved)&&saved.length?saved:[example]}catch{return [example]}}
    function save(){localStorage.setItem(storeKey,JSON.stringify(groups))}
    function escapeHtml(value){return String(value).replace(/[&<>'"]/g,c=>({ '&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;' }[c]))}
    function render(){const group=active(); if(!group)return; const total=group.items.length, done=group.items.filter(i=>i.done).length, percent=total?Math.round(done/total*100):0;
      $('#groups').innerHTML=groups.map(g=>`<button class="group ${g.id===activeId?'active':''}" data-group="${g.id}"><span class="group-title">${escapeHtml(g.name)}</span><span class="group-meta">${escapeHtml(g.type)} · ${g.items.length} items</span></button>`).join('');
      $('#board').innerHTML=`<div class="board-head"><div><p class="trip-type">${escapeHtml(group.type)}</p><h2>${escapeHtml(group.name)}</h2><p class="board-sub">Samen voorbereid, zonder gedoe.</p></div><button class="delete" id="deleteGroup">Verwijder groep</button></div><div class="progress"><div style="width:${percent}%"></div></div><p class="progress-note">${done} van ${total} afgevinkt</p><div class="columns">${list('spullen','🎒 Mee te nemen')} ${list('taken','✓ Taken')}</div>`;
      document.querySelectorAll('[data-group]').forEach(b=>b.addEventListener('click',()=>{activeId=Number(b.dataset.group);render()}));
      document.querySelectorAll('[data-add]').forEach(b=>b.addEventListener('click',()=>openModal(b.dataset.add)));
      document.querySelectorAll('[data-toggle]').forEach(b=>b.addEventListener('change',()=>toggleItem(Number(b.dataset.toggle))));
      document.querySelectorAll('[data-remove]').forEach(b=>b.addEventListener('click',()=>removeItem(Number(b.dataset.remove))));
      $('#deleteGroup').addEventListener('click',deleteGroup);
    }
    function list(kind,title){const items=active().items.filter(i=>i.kind===kind); return `<div class="list"><div class="list-top"><strong>${title}</strong><button class="add" data-add="${kind}">+ toevoegen</button></div>${items.length?items.map(i=>`<div class="item ${i.done?'done':''}"><input type="checkbox" aria-label="${i.done?'Niet voltooid':'Voltooid'}" data-toggle="${i.id}" ${i.done?'checked':''}><span class="item-name">${escapeHtml(i.name)}</span>${i.owner?`<span class="owner">${escapeHtml(i.owner)}</span>`:'<span></span>'}<button class="remove" aria-label="Verwijder ${escapeHtml(i.name)}" data-remove="${i.id}">×</button></div>`).join(''):`<p class="empty">Nog niets toegevoegd.</p>`}</div>`}
    function toggleItem(id){const item=active().items.find(i=>i.id===id);item.done=!item.done;save();render()}
    function removeItem(id){active().items=active().items.filter(i=>i.id!==id);save();render()}
    function deleteGroup(){if(!confirm(`Groep '${active().name}' verwijderen?`))return;groups=groups.filter(g=>g.id!==activeId);if(!groups.length)groups=[{id:uid(),name:'Nieuwe groep',type:'Anders',items:[]}];activeId=groups[0].id;save();render()}
    function openModal(kind){itemKind=kind;$('#modalTitle').textContent=kind==='spullen'?'Spul toevoegen':'Taak toevoegen';$('#modalText').textContent=kind==='spullen'?'Wat moet er mee?':'Wat moet nog gebeuren?';$('#itemName').value='';$('#itemOwner').value='';$('#modalLayer').classList.add('open');$('#modalLayer').setAttribute('aria-hidden','false');setTimeout(()=>$('#itemName').focus(),20)}
    function closeModal(){$('#modalLayer').classList.remove('open');$('#modalLayer').setAttribute('aria-hidden','true')}
    $('#newGroupForm').addEventListener('submit',e=>{e.preventDefault();const name=$('#groupName').value.trim();if(!name)return;const group={id:uid(),name,type:$('#groupType').value,items:[]};groups.push(group);activeId=group.id;$('#groupName').value='';save();render()});
    $('#itemForm').addEventListener('submit',e=>{e.preventDefault();const name=$('#itemName').value.trim();if(!name)return;active().items.push({id:uid(),kind:itemKind,name,owner:$('#itemOwner').value.trim(),done:false});save();closeModal();render()});
    $('#cancel').addEventListener('click',closeModal);$('#modalLayer').addEventListener('click',e=>{if(e.target===e.currentTarget)closeModal()});render();
  </script>
</body>
</html>
