<!doctype html>
<html lang="nl"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>PakMaatje — Festival mode</title><style>
:root{--lime:#d8ff37;--ink:#f4f8ee;--muted:#9ca79d;--black:#080b09;--card:#111713;--line:#2a362c}*{box-sizing:border-box}body{margin:0;background:radial-gradient(circle at 12% 0,#273b12,transparent 28%),var(--black);color:var(--ink);font:15px Inter,system-ui,sans-serif}.hero{padding:52px max(22px,calc((100% - 1060px)/2)) 74px;overflow:hidden;position:relative;background:linear-gradient(125deg,#090c09,#182710)}.hero:after{content:"";position:absolute;right:-7vw;bottom:-22vw;width:48vw;height:48vw;opacity:.27;background:repeating-radial-gradient(circle,transparent 0 17px,var(--lime) 18px 20px,transparent 21px 34px)}h1{position:relative;z-index:1;margin:0;font-size:clamp(42px,7vw,76px);letter-spacing:-4px;line-height:.9;text-transform:uppercase}h1:first-letter{color:var(--lime)}.hero p{position:relative;z-index:1;max-width:500px;color:#d8e1d5;line-height:1.55}main{max-width:1060px;margin:-27px auto;padding:0 22px 60px}.panel{background:var(--card);border:1px solid var(--line);box-shadow:0 12px 30px #0007}.create{display:grid;grid-template-columns:1fr 155px auto;gap:9px;padding:13px}.input{width:100%;padding:12px;border:1px solid #354137;color:var(--ink);background:#0a0e0b;outline-color:var(--lime)}button{border:0;cursor:pointer;font:inherit}.primary{padding:12px 17px;color:#0b1008;background:var(--lime);font-weight:900;letter-spacing:.05em;text-transform:uppercase}.app{display:grid;grid-template-columns:250px 1fr;gap:15px;margin-top:17px}.sidebar{padding:12px}.eyebrow,.type{color:var(--lime);font-size:12px;font-weight:900;letter-spacing:.12em;text-transform:uppercase}.group{width:100%;padding:12px;border-left:3px solid transparent;background:transparent;color:var(--ink);text-align:left}.group:hover,.group.active{background:#1e2b17;border-left-color:var(--lime);color:var(--lime)}.group small{display:block;color:var(--muted);margin-top:3px}.board{padding:27px;position:relative}.board:before{content:"PACK · PLAN · PARTY";position:absolute;top:11px;right:10px;color:#273229;font-size:10px;letter-spacing:.17em;font-weight:900}.top{display:flex;justify-content:space-between;gap:8px}.top h2{margin:4px 0;font-size:31px;text-transform:uppercase;letter-spacing:-1px}.sub{color:var(--muted);margin:0}.delete{background:none;color:#a2aba2}.bar{height:10px;margin-top:20px;background:#283029}.bar div{height:100%;background:repeating-linear-gradient(90deg,var(--lime) 0 18px,#a5d515 19px 22px)}.note{color:var(--muted);font-size:13px}.lists{display:grid;grid-template-columns:1fr 1fr;gap:13px;margin-top:23px}.list{border:1px solid var(--line);background:#0d120e}.listHead{display:flex;justify-content:space-between;align-items:center;padding:12px;background:#182117;border-bottom:2px solid var(--lime);font-weight:900;text-transform:uppercase;letter-spacing:.06em}.add{padding:7px 9px;background:var(--lime);color:#0b1008;font-size:12px;font-weight:900}.item{display:grid;grid-template-columns:20px 1fr auto;gap:9px;align-items:center;padding:11px;border-top:1px solid #273028}.item input{accent-color:var(--lime);width:18px;height:18px}.done span{text-decoration:line-through;color:var(--muted)}.x{background:none;color:#98a197;font-size:19px}.empty{padding:24px;text-align:center;color:var(--muted)}.modal{display:none;position:fixed;inset:0;background:#000b;place-items:center;padding:18px}.modal.show{display:grid}.modal form{width:min(410px,100%);padding:23px;background:#141c15;border:1px solid #5b6c53}.modal h3{margin:0}.modal label{display:block;margin:12px 0 5px;color:var(--muted);font-size:13px}.actions{display:flex;justify-content:end;gap:8px;margin-top:17px}.cancel{padding:12px;background:#2c362d;color:var(--ink)}@media(max-width:680px){.create,.app,.lists{grid-template-columns:1fr}.sidebar{display:flex;overflow:auto;gap:4px}.eyebrow{display:none}.group{min-width:170px}.board{padding:18px}.board:before{display:none}}
</style></head><body>
<header class="hero"><h1>PakMaatje</h1><p>Pack loud. Plan smart. Een gedeeld overzicht voor alles wat nog moet gebeuren en mee moet.</p></header><main>
<form class="create panel" id="new"><input class="input" id="name" required placeholder="Nieuwe groep, bv. Decibel 2026"><select class="input" id="type"><option>Festival</option><option>Vakantie</option><option>Weekend weg</option></select><button class="primary">Groep maken</button></form>
<div class="app"><aside class="sidebar panel"><p class="eyebrow">Jouw crew</p><div id="groups"></div></aside><section id="board" class="board panel"></section></div></main>
<div class="modal" id="modal"><form id="addForm"><h3 id="modalTitle">Toevoegen</h3><label>Wat moet er op de lijst?</label><input class="input" id="thing" required maxlength="70" placeholder="Bijv. oordoppen"><div class="actions"><button class="cancel" type="button" onclick="closeModal()">Annuleren</button><button class="primary">Toevoegen</button></div></form></div>
<script>
const db='pakmaatje-neon';let data=JSON.parse(localStorage.getItem(db)||'null')||[{id:1,name:'Festival crew',type:'Festival',items:[{id:11,k:'stuff',n:'Oordoppen',d:false},{id:12,k:'stuff',n:'Powerbank',d:true},{id:13,k:'stuff',n:'Zonnebrand',d:false},{id:14,k:'task',n:'Tickets downloaden',d:true},{id:15,k:'task',n:'Tent regelen',d:false}]}],current=data[0].id,kind='stuff';const q=s=>document.querySelector(s),save=()=>localStorage.setItem(db,JSON.stringify(data)),g=()=>data.find(x=>x.id===current),id=()=>Date.now()+Math.random();function esc(x){return x.replace(/[&<>'"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c]))}function render(){let a=g(),done=a.items.filter(i=>i.d).length; q('#groups').innerHTML=data.map(x=>`<button class="group ${x.id===current?'active':''}" onclick="pick(${x.id})">${esc(x.name)}<small>${esc(x.type)} · ${x.items.length} items</small></button>`).join('');q('#board').innerHTML=`<div class="top"><div><p class="type">${esc(a.type)}</p><h2>${esc(a.name)}</h2><p class="sub">Ready when the bass drops.</p></div><button class="delete" onclick="delGroup()">Verwijder</button></div><div class="bar"><div style="width:${a.items.length?done/a.items.length*100:0}%"></div></div><p class="note">${done} van ${a.items.length} afgevinkt</p><div class="lists">${list('stuff','🎒 Mee te nemen')}${list('task','✓ Taken')}</div>`}function list(k,title){let a=g().items.filter(i=>i.k===k);return `<div class="list"><div class="listHead">${title}<button class="add" onclick="openModal('${k}')">+ toevoegen</button></div>${a.length?a.map(i=>`<div class="item ${i.d?'done':''}"><input type="checkbox" ${i.d?'checked':''} onchange="toggle(${i.id})"><span>${esc(i.n)}</span><button class="x" onclick="remove(${i.id})">×</button></div>`).join(''):'<div class="empty">Nog leeg.</div>'}</div>`}function pick(x){current=x;render()}function toggle(x){let i=g().items.find(i=>i.id===x);i.d=!i.d;save();render()}function remove(x){g().items=g().items.filter(i=>i.id!==x);save();render()}function delGroup(){if(confirm('Groep verwijderen?')){data=data.filter(x=>x.id!==current);if(!data.length)data=[{id:id(),name:'Nieuwe crew',type:'Festival',items:[]}];current=data[0].id;save();render()}}function openModal(k){kind=k;q('#modalTitle').textContent=k==='stuff'?'Spul toevoegen':'Taak toevoegen';q('#modal').classList.add('show');setTimeout(()=>q('#thing').focus(),0)}function closeModal(){q('#modal').classList.remove('show')}q('#new').onsubmit=e=>{e.preventDefault();let x={id:id(),name:q('#name').value.trim(),type:q('#type').value,items:[]};data.push(x);current=x.id;q('#name').value='';save();render()};q('#addForm').onsubmit=e=>{e.preventDefault();g().items.push({id:id(),k:kind,n:q('#thing').value.trim(),d:false});q('#thing').value='';closeModal();save();render()};render();
</script></body></html>
